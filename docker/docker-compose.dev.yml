version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: clira_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: clira
      POSTGRES_PASSWORD: clira_dev_password
      POSTGRES_DB: clira_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clira -d clira_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clira_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
